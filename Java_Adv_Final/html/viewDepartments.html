<div class="container-lg">
    <div class="table-responsive">
        <div class="table-wrapper">
            <div class="table-title">
                <div class="row">
                    <div class="col-sm-8">
                        <h2>Department <b>View List</b></h2>
                    </div>
                    <div class="col-sm-4">
                        <button type="button" class="btn btn-info add-new" data-toggle="modal"
                            onclick="openAddModal1()"><i class="material-icons">&#xE147;</i> Add New</button>
                            <button type="button" class="btn btn-danger" data-toggle="modal"
                            onclick="deleteAllDepartment1()"><i class="material-icons">&#xE15C;</i>Delete All</button>
                    </div>
                    <!-- <div class="col-sm-6">
                        <button type="button" class="btn btn-info add-new" data-toggle="modal" onclick="openAddModal()"><i class="material-icons">&#xE147;</i> Add New</button>
                        <button type="button" class="btn btn-danger" data-toggle="modal" onclick="deleteAllModal()"><i class="material-icons">&#xE15C;</i>Delete All</button>
                    </div> -->
                </div>
            </div>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="checkbox-all1" name="checkbox-all1" onclick="onChangeCheckboxAll1()"></th>
                        <th>Name</th>
                        <th>TotalMember</th>
                        <th>Type</th>
                        <th>CreateDate</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>

            <nav aria-label="Page navigation example">
                <ul class="pagination1" id = "pagination1">
            
                </ul>
            </nav>

        </div>
    </div>

    <!-- Modal HTML -->
    <div id="myModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <!-- header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="titleModal"></h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div class="modal-container">

                <!-- body -->
                <div class="modal-body">
                    <div class="modal-container">

                        <input type="hidden" id="id" name="id">

                        <label for="name"><b>Name</b></label>
                        <input type="text" placeholder="Enter Name" name="name" id="name" required>

                        <label for="totalMember"><b>totalMember</b></label>
                        <input type="text" placeholder="Enter totalMember" name="totalMember" id="totalMember" required>

                        <label for="type"><b>Type</b></label>
                        <input type="text" placeholder="Enter Type" name="type" id="type" required>
                        
                        <input type="hidden" id="createdDate1" name="createdDate1">
                        <p style="color: red;" id = "typeErrorMessage"></p>
                    </div>
                </div>

                <!-- footer -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="hideModal1()" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="save1()" data-dismiss="modal">Save</button>
                </div>
            </div>
        </div>
    </div>


    <!-- success alert -->
    <div class="alert alert-success" id="success-alert" style="display: none;">
        <button type="button" class="close" data-dismiss="alert">x</button>
        <strong>Success!</strong>
    </div>
</div>
